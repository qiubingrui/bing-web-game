<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI 塔罗牌小游戏</title>
    <style>
        body {
            background: #1a1a2e;
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
            padding: 30px;
        }
        .tarot-card {
            width: 140px;
            height: 210px;
            background: #f2e9d8;
            color: #222;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 10px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: 0.3s;
        }
        .tarot-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        #result {
            margin-top: 30px;
            font-size: 17px;
            line-height: 1.6;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            white-space: pre-line;
        }
        input {
            padding: 10px;
            width: 320px;
            border-radius: 6px;
            border: none;
            font-size: 15px;
        }
    </style>
</head>

<body>
    <h2>✨ AI 塔罗牌占卜</h2>
    <br>
    <input type="text" id="question" placeholder="输入你想问的问题（例如：我最近的运势）">
    <br><br>

    <div class="tarot-card" data-name="愚者">愚者</div>
    <div class="tarot-card" data-name="魔术师">魔术师</div>
    <div class="tarot-card" data-name="女祭司">女祭司</div>
    <div class="tarot-card" data-name="女皇">女皇</div>

    <div id="result">点击塔罗牌开始占卜...</div>

    <script>
        // ———— 只需要在这里填入你复制的那一长串 API Key ————
        const ARK_API_KEY = "sk-c7f28817-ffed-4e07-bda7-e787a14340ca";

        // 调用豆包 API 获取解读
        async function askTarot(card, question) {
            try {
                const res = await fetch("https://ark.cn-beijing.volces.com/api/v3/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + ARK_API_KEY // 单 Key 鉴权
                    },
                    body: JSON.stringify({
                        model: "doubao-1.5-lite", // 免费可用模型
                        messages: [
                            {
                                role: "system",
                                content: "你是温柔专业的塔罗师，语言亲切、简短、治愈，100字以内。"
                            },
                            {
                                role: "user",
                                content: `我抽到【${card}】，问题：${question}，请帮我解读。`
                            }
                        ],
                        max_tokens: 150
                    })
                });

                const data = await res.json();
                return data.choices?.[0]?.message?.content || "解牌失败，请再试一次。";
            } catch (e) {
                return "AI 暂时无法连接，换张牌试试～";
            }
        }

        // 点击牌
        document.querySelectorAll(".tarot-card").forEach(card => {
            card.onclick = async () => {
                const name = card.dataset.name;
                const q = document.getElementById("question").value || "我的整体运势";
                const result = document.getElementById("result");

                result.innerText = `🔮 你抽到了【${name}】\n\nAI 正在解读中...`;

                const ans = await askTarot(name, q);
                result.innerText = `🔮 你抽到了【${name}】\n\n${ans}`;
            };
        });
    </script>
</body>
</html>
